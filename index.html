<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz — Pháp Luật Đại Cương</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Phosphor Icons (professional, no emoji) -->
  <script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js" defer></script>
</head>
<body>

  <!-- ═══════════════════ SCREEN: HOME ═══════════════════ -->
  <div id="screen-home" class="screen active">
    <header class="home-header">
      <div class="brand">
        <i class="ph ph-scales" aria-hidden="true"></i>
        <span>LexQuiz</span>
      </div>
      <p class="brand-sub">Pháp Luật Đại Cương · ITE6</p>
    </header>

    <main class="home-main">
      <div class="home-hero">
        <div class="hero-badge">
          <i class="ph ph-certificate"></i>
          <span>Ôn tập cuối kỳ</span>
        </div>
        <h1 class="hero-title">Kiểm tra<br /><em>kiến thức pháp luật</em></h1>
        <p class="hero-desc">
          175 câu hỏi trắc nghiệm · 5 bộ đề · Thời gian 18 phút/đề
        </p>
      </div>

      <div class="quiz-sets" id="quiz-sets-list">
        <!-- Rendered by JS -->
      </div>

      <div class="mode-section">
        <h2 class="section-label">Chế độ luyện tập</h2>
        <div class="mode-cards">
          <button class="mode-card active" data-mode="exam" id="btn-mode-exam">
            <i class="ph ph-timer"></i>
            <strong>Thi thử</strong>
            <span>Giới hạn thời gian, chấm điểm</span>
          </button>
          <button class="mode-card" data-mode="practice" id="btn-mode-practice">
            <i class="ph ph-books"></i>
            <strong>Luyện tập</strong>
            <span>Xem đáp án ngay, không giới hạn</span>
          </button>
        </div>
      </div>

      <button class="btn-primary" id="btn-start">
        <i class="ph ph-play"></i>
        Bắt đầu
      </button>
    </main>
  </div>

  <!-- ═══════════════════ SCREEN: QUIZ ═══════════════════ -->
  <div id="screen-quiz" class="screen">
    <header class="quiz-header">
      <button class="btn-icon" id="btn-back-home" title="Về trang chủ">
        <i class="ph ph-arrow-left"></i>
      </button>

      <div class="quiz-meta">
        <span id="quiz-set-label" class="set-label"></span>
        <span class="dot">·</span>
        <span id="quiz-mode-label" class="mode-label"></span>
      </div>

      <div class="timer-block" id="timer-block">
        <i class="ph ph-clock"></i>
        <span id="timer-display">18:00</span>
      </div>
    </header>

    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progress-bar"></div>
    </div>

    <main class="quiz-main">
      <div class="question-counter">
        <span id="q-current">1</span>/<span id="q-total">35</span>
      </div>

      <div class="question-card" id="question-card">
        <p class="question-text" id="question-text"></p>

        <div class="options-grid" id="options-grid">
          <!-- Rendered by JS -->
        </div>
      </div>

      <div class="quiz-nav">
        <button class="btn-ghost" id="btn-prev">
          <i class="ph ph-caret-left"></i>
          Trước
        </button>
        <button class="btn-ghost" id="btn-flag" title="Đánh dấu">
          <i class="ph ph-flag"></i>
        </button>
        <button class="btn-secondary" id="btn-next">
          Tiếp
          <i class="ph ph-caret-right"></i>
        </button>
      </div>

      <!-- Question map -->
      <div class="question-map-wrap">
        <button class="collapse-toggle" id="btn-toggle-map">
          <i class="ph ph-squares-four"></i>
          Bản đồ câu hỏi
          <i class="ph ph-caret-down" id="map-caret"></i>
        </button>
        <div class="question-map" id="question-map"></div>
      </div>
    </main>

    <footer class="quiz-footer">
      <button class="btn-danger" id="btn-submit">
        <i class="ph ph-paper-plane-tilt"></i>
        Nộp bài
      </button>
    </footer>
  </div>

  <!-- ═══════════════════ SCREEN: RESULT ═══════════════════ -->
  <div id="screen-result" class="screen">
    <header class="result-header">
      <div class="brand">
        <i class="ph ph-scales"></i>
        <span>LexQuiz</span>
      </div>
    </header>

    <main class="result-main">
      <div class="result-card">
        <div class="score-ring" id="score-ring">
          <svg viewBox="0 0 120 120" class="ring-svg">
            <circle class="ring-bg" cx="60" cy="60" r="52"/>
            <circle class="ring-fill" id="ring-fill" cx="60" cy="60" r="52"
              stroke-dasharray="327" stroke-dashoffset="327"/>
          </svg>
          <div class="score-inner">
            <span class="score-num" id="score-num">0</span>
            <span class="score-denom" id="score-denom">/10</span>
          </div>
        </div>

        <div class="result-stats">
          <div class="stat">
            <i class="ph ph-check-circle"></i>
            <span id="stat-correct">0</span>
            <label>Đúng</label>
          </div>
          <div class="stat">
            <i class="ph ph-x-circle"></i>
            <span id="stat-wrong">0</span>
            <label>Sai</label>
          </div>
          <div class="stat">
            <i class="ph ph-minus-circle"></i>
            <span id="stat-skip">0</span>
            <label>Bỏ qua</label>
          </div>
        </div>

        <p class="result-verdict" id="result-verdict"></p>
      </div>

      <div class="review-section">
        <h2 class="section-label">Xem lại đáp án</h2>
        <div id="review-list"></div>
      </div>
    </main>

    <footer class="result-footer">
      <button class="btn-ghost full" id="btn-retry">
        <i class="ph ph-arrow-counter-clockwise"></i>
        Làm lại
      </button>
      <button class="btn-primary full" id="btn-home">
        <i class="ph ph-house"></i>
        Về trang chủ
      </button>
    </footer>
  </div>

  <!-- ═══════════════════ MODAL: Confirm submit ═══════════════════ -->
  <div class="modal-overlay" id="modal-submit">
    <div class="modal">
      <i class="ph ph-warning modal-icon"></i>
      <h3>Nộp bài?</h3>
      <p id="modal-msg">Bạn còn <strong id="modal-unanswered">0</strong> câu chưa trả lời.</p>
      <div class="modal-actions">
        <button class="btn-ghost" id="modal-cancel">Tiếp tục làm</button>
        <button class="btn-danger" id="modal-confirm">Nộp ngay</button>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
